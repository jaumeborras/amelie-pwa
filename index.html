<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>Amelie</title>
<meta name="description" content="Aplica el filtro Amelie a tus fotos" />
<meta name="theme-color" content="#ffffff" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Amelie" />
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
<link rel="icon" href="icons/favicon-32.png" />
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <header class="topbar">
      <span class="title">Amelie</span>
      <img src="logo.png" alt="Prinsotel" class="brand-logo" />
    </header>

    <main id="stage" class="stage">
      <div class="empty-state" id="emptyState">
        <div class="drop-icon">
          <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4">
            <path d="M12 16V4M12 4l-4 4M12 4l4 4" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <p class="empty-title">Elige fotos o un vídeo</p>
        <p class="empty-subtitle">Se les aplicará el filtro Amelie</p>
        <div class="empty-actions">
          <button class="btn btn-primary" id="pickBtn">Elegir fotos</button>
          <button class="btn btn-secondary" id="pickVideoBtn">Elegir vídeo</button>
        </div>
        <input type="file" id="fileInput" accept="image/*" multiple hidden />
        <input type="file" id="videoInput" accept="video/*" hidden />
      </div>

      <div class="video-state" id="videoState" hidden>
        <div class="video-canvas-wrap" id="videoCanvasWrap">
          <canvas id="videoCanvas"></canvas>
          <video id="videoResult" class="video-result" controls playsinline hidden></video>
          <div class="video-progress-overlay" id="videoProgressOverlay" hidden>
            <div class="spinner"></div>
            <div class="video-progress-bar"><div class="video-progress-fill" id="videoProgressFill"></div></div>
            <span id="videoProgressLabel">0:00 / 0:00</span>
            <button class="btn btn-secondary" id="videoCancelBtn">Cancelar</button>
          </div>
        </div>
      </div>

      <div class="preview-state" id="previewState" hidden>
        <div class="canvas-wrap" id="canvasWrap">
          <canvas id="canvas"></canvas>
          <div class="compare-overlay" id="compareOverlay">
            <div class="compare-divider" id="compareDivider">
              <div class="compare-grip">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M9 6l-6 6 6 6M15 6l6 6-6 6" stroke-linecap="round" stroke-linejoin="round"/></svg>
              </div>
            </div>
          </div>
          <div class="processing-overlay" id="processingOverlay" hidden>
            <div class="spinner"></div>
            <span>Aplicando Amelie…</span>
          </div>
          <div class="crop-frame" id="cropFrame" hidden></div>
          <div class="batch-position" id="batchPosition" hidden></div>
        </div>
        <div class="batch-strip" id="batchStrip" hidden></div>
      </div>
    </main>

    <footer class="toolbar" id="toolbar" hidden>
      <div class="format-control" id="formatControl">
        <span class="format-label">Formato</span>
        <div class="format-options">
          <button class="format-chip active" data-format="original">Original</button>
          <button class="format-chip" data-format="1:1">1:1</button>
          <button class="format-chip" data-format="4:5">4:5</button>
          <button class="format-chip" data-format="9:16">9:16</button>
        </div>
      </div>
      <div class="intensity-control">
        <span class="intensity-label">Intensidad</span>
        <input type="range" id="intensitySlider" min="0" max="100" value="100" />
        <span class="intensity-value" id="intensityValue">100%</span>
      </div>
      <div class="actions">
        <button class="btn btn-secondary" id="chooseAnotherBtn">Otra foto</button>
        <button class="btn btn-primary" id="saveBtn" disabled>Guardar</button>
      </div>
    </footer>

    <div class="toast" id="toast" hidden></div>

    <div class="save-confirm" id="saveConfirm" hidden>
      <div class="save-confirm-badge">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3"><path d="M4 12.5l4.5 4.5L20 6" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
  <script src="vendor/mp4box.all.min.js"></script>
  <script type="module">
    import { Muxer, ArrayBufferTarget } from './vendor/mp4-muxer.mjs';
    window.MP4Muxer = { Muxer, ArrayBufferTarget };
  </script>
  <script src="video.js"></script>
</body>
</html>
